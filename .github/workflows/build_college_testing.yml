name: build_college_testing

on:
  push:
    branches:
      - main

env:
  TASK_FOLDER: ${{ github.workspace }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create artifact directories
        run: mkdir -p video logs

      - name: Pull selenoid images
        run: |
          docker pull selenoid/vnc_chrome:128.0
          docker pull selenoid/video-recorder:latest-release

      - name: Run selenoid in Docker container
        run: docker compose -f docker-compose.yml up -d

      - name: Wait selenoid status
        run: |
          timeout 60 bash -c 'until curl -fsS http://127.0.0.1:4444/status; do sleep 2; done'
          echo "Selenoid is ready"

      - name: Build with Maven
        env:
          USE_REMOTE_DRIVER: 'true'
          SELENOID_URL: http://127.0.0.1:4444/wd/hub
        run: mvn -B test -Dallure.results.directory=target/allure-results

      - name: Generate Allure Report
        if: always()
        run: |
          if [ -d target/allure-results ] && [ "$(ls -A target/allure-results)" ]; then
            npm install -g allure-commandline@2.29.0
            allure generate target/allure-results --clean -o target/allure-report
          else
            mkdir -p target/allure-report
            printf '%s\n' '<html><body><h2>No Allure results were generated</h2></body></html>' > target/allure-report/index.html
          fi

      - name: Check video directory
        if: always()
        run: |
          echo "Video directory contents:"
          ls -lah ./video || true

      - name: Show Selenoid logs
        if: always()
        run: |
          echo "Selenoid logs:"
          docker compose -f docker-compose.yml logs --no-color selenoid | tail -50 || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: ./target/surefire-reports
          if-no-files-found: warn

      - name: Upload allure-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: ./target/allure-results
          if-no-files-found: warn

      - name: Upload allure-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: ./target/allure-report
          if-no-files-found: warn

      - name: Upload video
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: ./video
          if-no-files-found: warn

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: ./logs
          if-no-files-found: warn

      - name: Stop containers
        if: always()
        run: docker compose -f docker-compose.yml down -v

